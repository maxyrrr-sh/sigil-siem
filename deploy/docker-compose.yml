# Sigil SIEM — local dev stack (DESIGN §13.4).
# Sigil core (monolith) + ML sidecar + MinIO (object store) + Redpanda (bus)
# + Prometheus/Grafana (self-metrics, DESIGN §15) + optional NATS JetStream
# (alternative transport backend behind the same `Transport` trait).
# Run from anywhere:  docker compose -f deploy/docker-compose.yml up --build
# Include the optional NATS transport:
#   docker compose -f deploy/docker-compose.yml --profile nats up --build
services:
  sigil:
    build:
      context: ..
      dockerfile: Dockerfile
    # Uses the image's bundled configs/sigil.yaml (CMD in the Dockerfile).
    environment:
      # Credentials for the S3 cold archive (configs/sigil.yaml →
      # object_store.kind: s3 → the MinIO service). object_store reads the
      # standard AWS_* env vars, not MINIO_*; these mirror the MinIO root creds.
      AWS_ACCESS_KEY_ID: sigil
      AWS_SECRET_ACCESS_KEY: sigil-dev-secret
      AWS_REGION: us-east-1
      AWS_ALLOW_HTTP: "true"
    ports:
      - "8080:8080"       # query API / UI  → http://localhost:8080/ui
      - "5514:5514/udp"   # syslog
    volumes:
      - sigil-data:/opt/sigil/data
    depends_on:
      ml-sidecar: { condition: service_started }
      redpanda: { condition: service_started }
      createbuckets: { condition: service_completed_successfully }

  web:
    build:
      context: ..
      dockerfile: frontend/Dockerfile
    ports:
      - "8088:80"         # web console → http://localhost:8088
    depends_on: [sigil]

  ml-sidecar:
    build:
      context: ..
      dockerfile: ml-sidecar/Dockerfile
    ports:
      - "50051:50051"     # gRPC (Arrow Flight later)

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: sigil
      MINIO_ROOT_PASSWORD: sigil-dev-secret
    ports: ["9000:9000", "9001:9001"]   # 9000 = S3 API · 9001 = console
    volumes: ["minio-data:/data"]
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 10

  # One-shot: wait for MinIO, then create the `sigil-cold` bucket the S3 cold
  # archive writes to (object_store does not create buckets itself). Exits 0,
  # gating the `sigil` service via `service_completed_successfully`.
  createbuckets:
    image: minio/mc:latest
    depends_on:
      minio: { condition: service_healthy }
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 sigil sigil-dev-secret &&
      mc mb --ignore-existing local/sigil-cold &&
      echo 'bucket sigil-cold ready'
      "

  redpanda:
    image: redpandadata/redpanda:latest
    command: >
      redpanda start
      --smp 1 --overprovisioned
      --kafka-addr PLAINTEXT://0.0.0.0:9092
      --advertise-kafka-addr PLAINTEXT://redpanda:9092
    ports: ["9092:9092"]

  # Optional alternative cluster transport (DESIGN §4, ADR §19.2). Not started
  # by default — enable with `--profile nats`, and point
  # `cluster.transport.kind: nats` at it instead of `redpanda`.
  nats:
    image: nats:latest
    command: ["-js"]        # JetStream enabled
    ports: ["4222:4222", "8222:8222"]   # 4222 = client · 8222 = monitoring
    profiles: ["nats"]

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports: ["9090:9090"]    # Prometheus UI → http://localhost:9090
    depends_on: [sigil]

  grafana:
    image: grafana/grafana:latest
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    ports: ["3000:3000"]    # Grafana UI → http://localhost:3000
    depends_on: [prometheus]

volumes:
  minio-data: {}
  sigil-data: {}
  prometheus-data: {}
  grafana-data: {}
