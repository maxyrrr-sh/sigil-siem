---
- name: Create the web root
  ansible.builtin.file:
    path: /var/www/sigil
    state: directory
    owner: root
    group: www-data
    mode: "0755"

# --- Option A (default): ship the prebuilt SPA from the repo ----------------
- name: Deploy the prebuilt SPA (frontend/dist)
  ansible.builtin.copy:
    src: "{{ sigil_repo_local }}/frontend/dist/"
    dest: /var/www/sigil/
    owner: root
    group: www-data
    mode: "0644"
    directory_mode: "0755"
  when: not (frontend_build | bool)

# --- Option B: build the SPA on the host with Node --------------------------
- name: Build the SPA on the host
  when: frontend_build | bool
  block:
    - name: Ensure the apt keyrings directory exists
      ansible.builtin.file:
        path: /etc/apt/keyrings
        state: directory
        mode: "0755"

    - name: Add the NodeSource apt key
      ansible.builtin.get_url:
        url: https://deb.nodesource.com/gpgkey/nodesource-repo.gpg.key
        dest: /etc/apt/keyrings/nodesource.asc
        mode: "0644"

    - name: Add the NodeSource repository
      ansible.builtin.apt_repository:
        repo: "deb [signed-by=/etc/apt/keyrings/nodesource.asc] https://deb.nodesource.com/node_{{ node_major }}.x nodistro main"
        filename: nodesource
        state: present

    - name: Install Node.js
      ansible.builtin.apt:
        name: nodejs
        state: present
        update_cache: true

    - name: Sync the frontend source
      ansible.posix.synchronize:
        src: "{{ sigil_repo_local }}/frontend/"
        dest: "{{ sigil_src_dir }}/frontend/"
        delete: false
        rsync_opts:
          - "--exclude=node_modules"
          - "--exclude=dist"

    - name: Install SPA dependencies
      ansible.builtin.command:
        cmd: npm ci
        chdir: "{{ sigil_src_dir }}/frontend"
      changed_when: true

    - name: Build the SPA
      ansible.builtin.command:
        cmd: npm run build
        chdir: "{{ sigil_src_dir }}/frontend"
      changed_when: true

    - name: Publish the built SPA
      ansible.builtin.copy:
        src: "{{ sigil_src_dir }}/frontend/dist/"
        dest: /var/www/sigil/
        remote_src: true
        owner: root
        group: www-data
        mode: "0644"
        directory_mode: "0755"
