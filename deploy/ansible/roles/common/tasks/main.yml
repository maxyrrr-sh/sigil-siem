---
- name: Update apt cache
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600

- name: Install base packages
  ansible.builtin.apt:
    name:
      - ca-certificates
      - curl
      - gnupg
      - openssl
      - apt-transport-https
      - rsync
      - acl
    state: present

- name: Create the sigil service group
  ansible.builtin.group:
    name: sigil
    system: true

- name: Create the sigil service user
  ansible.builtin.user:
    name: sigil
    group: sigil
    system: true
    home: /var/lib/sigil
    create_home: false
    shell: /usr/sbin/nologin

- name: Create the ml-sidecar service user
  ansible.builtin.user:
    name: sigil-ml
    system: true
    home: /opt/sigil/ml-sidecar
    create_home: false
    shell: /usr/sbin/nologin

- name: Create sigil config + data directories
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    owner: "{{ item.owner }}"
    group: "{{ item.group }}"
    mode: "{{ item.mode }}"
  loop:
    # owned by sigil (not root): the admin `/api/v1/config` save endpoint
    # writes sigil.yaml + a .bak in place, so the service user needs write
    # access to the directory itself. rules/ and tls/ below stay root-owned
    # and read-only to the process.
    - { path: /etc/sigil, owner: sigil, group: sigil, mode: "0750" }
    - { path: /etc/sigil/rules, owner: root, group: sigil, mode: "0750" }
    - { path: "{{ tls_dir }}", owner: root, group: sigil, mode: "0750" }
    - { path: /var/lib/sigil, owner: sigil, group: sigil, mode: "0750" }
    - { path: /var/lib/sigil/store, owner: sigil, group: sigil, mode: "0750" }
    - { path: /var/lib/sigil/index, owner: sigil, group: sigil, mode: "0750" }
    - { path: /var/lib/sigil/cold, owner: sigil, group: sigil, mode: "0750" }
    - { path: /var/log/sigil, owner: sigil, group: sigil, mode: "0750" }
