---
- name: Install Python runtime for the ML sidecar
  ansible.builtin.apt:
    name:
      - python3
      - python3-venv
      - python3-pip
    state: present

- name: Create the ML sidecar directory
  ansible.builtin.file:
    path: /opt/sigil/ml-sidecar
    state: directory
    owner: sigil-ml
    group: sigil-ml
    mode: "0755"

- name: Deploy the sidecar package source
  ansible.builtin.copy:
    src: "{{ sigil_repo_local }}/ml-sidecar/sidecar/"
    dest: /opt/sigil/ml-sidecar/sidecar/
    owner: sigil-ml
    group: sigil-ml
    mode: "0644"
  notify: Restart sigil-ml

- name: Deploy the proto contract
  ansible.builtin.copy:
    src: "{{ sigil_repo_local }}/proto/"
    dest: /opt/sigil/ml-sidecar/proto/
    owner: sigil-ml
    group: sigil-ml
    mode: "0644"
  notify: Restart sigil-ml

- name: Create the sidecar virtualenv and install gRPC deps
  ansible.builtin.pip:
    name:
      - "grpcio>=1.60"
      - "grpcio-tools>=1.60"
    virtualenv: /opt/sigil/ml-sidecar/venv
    virtualenv_command: python3 -m venv
  notify: Restart sigil-ml

- name: Own the sidecar tree
  ansible.builtin.file:
    path: /opt/sigil/ml-sidecar
    state: directory
    recurse: true
    owner: sigil-ml
    group: sigil-ml

- name: Install the ML sidecar systemd unit
  ansible.builtin.template:
    src: sigil-ml.service.j2
    dest: /etc/systemd/system/sigil-ml.service
    owner: root
    group: root
    mode: "0644"
  notify:
    - Reload systemd
    - Restart sigil-ml

- name: Enable and start the ML sidecar
  ansible.builtin.systemd:
    name: sigil-ml
    enabled: true
    state: started
    daemon_reload: true
