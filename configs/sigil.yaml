# Sigil SIEM - example declarative configuration.
# Validate with:  sigil config validate ./configs/sigil.yaml
# Reference: docs/DESIGN.md §13.
version: 1

# Durable store for alert triage + saved objects (survives restarts).
data_dir: ./data/store

# API authentication + RBAC (DESIGN §14). The Svelte console is the authenticated
# UI. Generate a password hash with:  sigil auth hash <password>
# For production set `jwt_secret` and use `password_hash` instead of `password`.
auth:
  enabled: true
  jwt_secret: ""            # empty = ephemeral secret (tokens reset on restart)
  token_ttl_secs: 28800     # 8h
  users:
    - username: admin
      password: changeme    # dev only — prefer `password_hash: "$argon2id$..."`
      roles: [admin]

# Optional ML sidecar (SecureBERT embeddings / GNN scoring). Unset = offline
# embedder. Requires building correlate with `--features sidecar` to use.
# ml_sidecar: http://127.0.0.1:50051

cluster:
  targets: [all]                 # or e.g. [ingest, index] on this node
  object_store:
    kind: s3
    bucket: sigil-cold
    endpoint: http://minio:9000
  transport:
    kind: redpanda               # default distributed bus (Kafka protocol)
    brokers: ["redpanda:9092"]
    # kind: inproc               # monolith mode needs no broker at all

inputs:
  - id: syslog_main
    type: syslog
    listen: 0.0.0.0:5514
    codec: { type: syslog, rfc: 5424 }

  - id: gcp_audit
    type: gcp_pubsub             # Cloud Logging -> Log Router sink -> Pub/Sub
    project: my-project
    subscription: sigil-logs-sub
    codec: { type: json }

  # AWS EventBridge is a router: consume via one of its targets (SQS/Kinesis).
  - id: aws_events
    type: sqs
    queue_url: https://sqs.eu-central-1.amazonaws.com/123456789012/sigil-events
    codec: { type: json }

pipelines:
  - id: default
    from: [syslog_main, gcp_audit, aws_events]
    steps:
      - normalize: { schema: ocsf }
      # Enrichers run on the hot path after normalize. `redact`/`entropy` are
      # offline; `threatintel` matches a local IOC feed. `geoip` needs a
      # MaxMind db (not implemented yet) and is recognized-but-skipped.
      - enrich:
          - redact
          - entropy
          - { threatintel: { feed: ./configs/iocs.txt } }
    route:
      - to: index
      - to: sigma
      - to: correlation

index:
  retention: { hot: 7d, warm: 30d, cold: 365d }

sigma:
  enabled: true
  rules_dir: configs/rules           # load Sigma rule YAML from here (recursive)
  rulepacks: ["sigmahq/windows", "local/custom"]   # named packs: not resolvable yet
  outputs:
    file: data/alerts.jsonl          # append matched alerts as JSON lines
    # webhook: https://hooks.example.com/sigil
    # slack: https://hooks.slack.com/services/T000/B000/XXXX
    # pagerduty: { routing_key: "R0UTING_KEY" }
    # jira: { url: https://org.atlassian.net, project: SEC, user: bot@org, token: "API_TOKEN" }
    # misp: { url: https://misp.example.com, api_key: "MISP_KEY" }

# Custom (non-Sigma) detectors, evaluated after the Sigma engine. `dga` flags
# algorithmically-generated domains using the `dga.score` from the `entropy`
# enricher (so enable `enrich: [entropy]` for it to have signal).
detectors:
  - { dga: { threshold: 3.5 } }

correlation:
  enabled: true
  sidecar: { endpoint: grpc://ml-sidecar:50051, transport: arrow-flight }
  embedder: { model: securebert-logs, version: 1.2 }
  graph: { cross_domain: true, window: 30m }
  gnn: { model: graphsage, anomaly: masked-autoencoder }
  path_selector: { strategy: beam-search }   # default chain assembly
  modules:
    - { name: rl-grain, enabled: false }     # optional RL module (GRAIN) -> strategy: rl
  attribution: { attack_mapping: true, actor_level: false }

plugins:
  - name: my_custom_parser
    kind: wasm
    path: ./plugins/my_parser.wasm
    capabilities: ["read:field:message"]

# EDR agent gateway (DESIGN §12 — optional endpoint companion). When enabled, a
# node holding the `index` role serves a gRPC gateway that enrolled `sigil-agent`
# endpoints push telemetry to and receive response commands from. Disabled by
# default: the SIEM stays a pure telemetry consumer unless opted in. See
# docs/EDR.md.
edr:
  enabled: false
  listen: 0.0.0.0:50055
  # TLS is strongly recommended for any non-loopback deployment.
  # tls_cert: /etc/sigil/edr-cert.pem
  # tls_key: /etc/sigil/edr-key.pem
  # Pre-shared enrollment tokens; issue more at runtime via the admin API
  # (POST /api/v1/edr/enroll-tokens). Rotate these.
  enrollment_tokens: []
