title: Sudo Command Executed As Root
id: a2c4e6f8-sudo-root
status: experimental
description: A command was run via sudo escalating to the root user.
logsource:
  product: linux
  service: sudo
detection:
  selection:
    app: sudo
    message|contains: 'USER=root'
  filter:
    message|contains: 'COMMAND=/usr/bin/id'
  condition: selection and not filter
level: low
tags:
  - attack.privilege_escalation
  - attack.t1548.003
