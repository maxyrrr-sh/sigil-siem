title: SSH Failed Password
id: 0d1b2c3a-ssh-failed-password
status: experimental
description: A failed SSH password authentication, indicative of brute forcing.
logsource:
  product: linux
  service: sshd
detection:
  selection:
    app: sshd
    message|contains: 'Failed password'
  condition: selection
level: medium
tags:
  - attack.credential_access
  - attack.t1110.001
