title: Sensitive Credential File Access
id: edr-0003-cred-file-access
status: experimental
description: >
  Access to a well-known credential store (shadow file, SSH keys, cloud creds,
  Windows SAM/NTDS) — credential theft.
logsource:
  category: file_event
detection:
  selection:
    file.path|contains:
      - /etc/shadow
      - /etc/gshadow
      - .ssh/id_rsa
      - .aws/credentials
      - .config/gcloud/credentials
      - \SAM
      - NTDS.dit
  condition: selection
level: high
tags:
  - attack.credential_access
  - attack.t1003
