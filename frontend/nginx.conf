# Serve the Sigil SPA and reverse-proxy /api/* to the sigil API service.
server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # /api/<path> → http://sigil:8080/api/<path> (path forwarded unchanged; the API
  # serves the versioned surface under /api/v1).
  # A variable upstream + resolver defers DNS to request time, so the container
  # starts even when the API isn't up yet / isn't on this network.
  location /api/ {
    resolver 127.0.0.11 ipv6=off valid=10s;   # Docker embedded DNS
    set $sigil_host sigil;
    proxy_pass http://$sigil_host:8080;        # no rewrite — keep the /api prefix
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header Connection "";
    proxy_buffering off;                       # keep SSE (/stream/alerts) responsive
    proxy_read_timeout 1h;
  }

  location / {
    try_files $uri $uri/ /index.html;          # SPA fallback
  }
}
