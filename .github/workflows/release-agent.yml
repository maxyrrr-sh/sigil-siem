name: Release agent packages

on:
  push:
    branches: [main]
    paths:
      - "crates/sigil-agent/**"
      - "crates/sigil-edr-proto/**"
      - "proto/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "docs/EDR.md"
      - ".github/workflows/release-agent.yml"
  workflow_dispatch: {}

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

jobs:
  version:
    name: Determine version
    runs-on: ubuntu-latest
    outputs:
      short_sha: ${{ steps.version.outputs.short_sha }}
      agent_version: ${{ steps.version.outputs.agent_version }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - id: version
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          BASE_VERSION="$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[] | select(.name == "sigil-agent") | .version')"
          echo "short_sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "agent_version=${BASE_VERSION}~${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "tag=agent-nightly-${SHORT_SHA}" >> "$GITHUB_OUTPUT"

  build-linux-deb:
    name: Build .deb (Linux)
    needs: version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: agent-linux

      - name: Install cargo-deb
        run: cargo install cargo-deb --locked

      - name: Build release binary
        run: cargo build --release -p sigil-agent

      - name: Build .deb package
        run: >
          cargo deb -p sigil-agent --no-build
          --deb-version "${{ needs.version.outputs.agent_version }}"
          -o target/debian/sigil-agent.deb

      - uses: actions/upload-artifact@v4
        with:
          name: sigil-agent-linux-deb
          path: target/debian/sigil-agent.deb
          if-no-files-found: error

  build-macos:
    name: Build archive (macOS)
    needs: version
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: agent-macos

      - name: Build release binary
        run: cargo build --release -p sigil-agent

      - name: Package tar.gz
        run: |
          ARCH="$(uname -m)"
          OUT="sigil-agent-macos-${ARCH}.tar.gz"
          tar czf "$OUT" -C target/release sigil-agent -C "${GITHUB_WORKSPACE}/docs" EDR.md
          echo "OUT=${OUT}" >> "$GITHUB_ENV"

      - uses: actions/upload-artifact@v4
        with:
          name: sigil-agent-macos
          path: ${{ env.OUT }}
          if-no-files-found: error

  build-windows:
    name: Build archive (Windows)
    needs: version
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: agent-windows

      - name: Build release binary
        run: cargo build --release -p sigil-agent

      - name: Package zip
        run: |
          $out = "sigil-agent-windows-x86_64.zip"
          Compress-Archive -Path target/release/sigil-agent.exe, docs/EDR.md -DestinationPath $out
          echo "OUT=$out" >> $env:GITHUB_ENV

      - uses: actions/upload-artifact@v4
        with:
          name: sigil-agent-windows
          path: ${{ env.OUT }}
          if-no-files-found: error

  release:
    name: Publish release
    needs: [version, build-linux-deb, build-macos, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.tag }}
          name: "Sigil Agent ${{ needs.version.outputs.agent_version }}"
          target_commitish: ${{ github.sha }}
          prerelease: true
          generate_release_notes: true
          files: dist/*
